name: CI
on:
  push:
  pull_request:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-matrix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout-minutes }}

    env:
      CI_FAILFAST_TEST_LEAVE_DANGLING: 1  # GHA does not care about dangling processes and setting this variable avoids killing the CI script itself on error
      DANGER_CI_ON_HOST_FOLDERS: 1
      FILE_ENV: ${{ matrix.file-env }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'fuzz'
            runner: 'ubuntu-latest'
            # To catch potential timeouts early, this task must replicate the config from https://github.com/aixcoin/aixcoin/blob/master/.github/workflows/ci.yml
            timeout-minutes: 240
            file-env: './ci/test/00_setup_env_native_fuzz.sh'
          - name: 'fuzz (msan)'
            runner: 'ubuntu-latest'
            timeout-minutes: 360
            file-env: './ci/test/00_setup_env_native_fuzz_with_msan.sh'
          - name: 'fuzz (valgrind)'
            runner: 'ubuntu-latest'
            timeout-minutes: 360
            file-env: './ci/test/00_setup_env_native_fuzz_with_valgrind.sh'

    steps:
      - name: Checkout Aixcoin Core
        uses: actions/checkout@v5
        with:
          repository: aixcoin/aixcoin
          fetch-depth: 1

      - name: Checkout
        uses: actions/checkout@v5
        with:
          path: qa-assets
          fetch-depth: 1

      - name: Clear unnecessary files on bloated GHA VM
        uses: aixcoin/aixcoin/.github/actions/clear-files@master

      - name: Configure environment
        uses: aixcoin/aixcoin/.github/actions/configure-environment@master

      - name: Restore caches
        id: restore-cache
        uses: aixcoin/aixcoin/.github/actions/restore-caches@master

      - name: Configure Docker
        uses: aixcoin/aixcoin/.github/actions/configure-docker@master
        with:
          cache-provider: 'gha'

      - name: CI script
        run: |
          mkdir -p ./ci/scratch/qa-assets
          mv ./qa-assets/{.git,fuzz_corpora} ./ci/scratch/qa-assets/
          ./ci/test_run_all.sh

      - name: Save caches
        uses: aixcoin/aixcoin/.github/actions/save-caches@master
